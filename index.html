<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>ORBIT</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/public/favicon.svg">

  <style>
    :root {
      --bg:     #0a0a0a;
      --text:   #f0ece4;
      --accent: #b87333;

      --bg-10:     rgba(10, 10, 10, 0.10);
      --bg-80:     rgba(10, 10, 10, 0.80);
      --text-40:   rgba(240, 236, 228, 0.40);
      --text-70:   rgba(240, 236, 228, 0.70);
      --accent-20: rgba(184, 115, 51, 0.20);
      --accent-60: rgba(184, 115, 51, 0.60);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 56px;
      border-bottom: 1px solid var(--accent-20);
      background: var(--bg-80);
      backdrop-filter: blur(8px);
    }

    .nav-wordmark {
      font-family: 'Courier Prime', monospace;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: var(--accent);
      text-transform: uppercase;
      text-decoration: none;
      user-select: none;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .nav-atom { flex-shrink: 0; }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      font-family: 'Courier Prime', monospace;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.14em;
      color: var(--text-70);
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.15s ease;
      cursor: pointer;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--text);
    }

    .nav-links a.active {
      color: var(--accent);
    }

    /* ── VIEWS ── */
    main {
      padding-top: 56px;
      width: 100%;
      height: 100%;
    }

    .view {
      display: none;
      width: 100%;
      height: calc(100vh - 56px);
    }

    .view.active {
      display: block;
    }

    #orbit-view  { /* canvas fills this */ }
    #search-view { padding: 40px 32px; }
    #suggest-view { padding: 40px 32px; }

    @media (max-width: 700px) {
      #search-view, #suggest-view { padding: 24px 0; }
    }

    /* ── MOBILE NAV ── */
    @media (max-width: 480px) {
      nav { padding: 0 16px; }
      .nav-links { gap: 14px; }
      .nav-links a { font-size: 10px; letter-spacing: 0.1em; }
    }
    @media (max-width: 340px) {
      .nav-wordmark { display: none; }
    }

    /* ── GUEST MODAL ── */
    .guest-modal-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(10,10,10,0.96);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .guest-modal-card {
      max-width: 420px; width: 100%;
      border: 1px solid rgba(184,115,51,0.5);
      padding: 40px 36px;
      background: #0a0a0a;
    }
    .guest-modal-eyebrow {
      font-family: 'Courier Prime', monospace;
      font-size: 10px; letter-spacing: 0.2em;
      color: rgba(184,115,51,0.6);
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .guest-modal-msg {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; color: rgba(240,236,228,0.75);
      line-height: 1.65; margin-bottom: 28px;
    }
    .guest-modal-input {
      width: 100%; background: transparent;
      border: none; border-bottom: 1px solid rgba(184,115,51,0.35);
      color: #f0ece4; font-family: 'DM Sans', sans-serif;
      font-size: 15px; padding: 8px 0 12px;
      outline: none; margin-bottom: 20px;
      transition: border-color 0.2s ease; display: block;
    }
    .guest-modal-input:focus { border-bottom-color: #b87333; }
    .guest-modal-input::placeholder { color: rgba(240,236,228,0.2); }
    .guest-modal-btn {
      background: none; border: 1px solid rgba(184,115,51,0.5);
      color: #b87333; font-family: 'Courier Prime', monospace;
      font-size: 12px; letter-spacing: 0.18em;
      text-transform: uppercase; padding: 10px 28px;
      cursor: pointer; transition: all 0.15s ease;
    }
    .guest-modal-btn:hover:not(:disabled) {
      background: rgba(184,115,51,0.1);
      border-color: #b87333; color: #f0ece4;
    }
    .guest-modal-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .guest-modal-status {
      font-family: 'Courier Prime', monospace;
      font-size: 11px; color: rgba(184,115,51,0.65);
      letter-spacing: 0.1em; margin-top: 14px; min-height: 1.4em;
    }

    /* ── GRAVITY PROFILE NAV LINK ── */
    #gravity-profile-link {
      font-family: 'Courier Prime', monospace;
      font-size: 12px; font-weight: 400;
      letter-spacing: 0.14em;
      color: var(--text-70);
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.15s ease;
      background: none; border: none; padding: 0;
    }
    #gravity-profile-link:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    /* ── GRAVITY PROFILE MODAL ── */
    .gp-overlay {
      position: fixed; inset: 0; z-index: 201;
      background: #0a0a0a;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 80px 24px 60px;
      overflow-y: auto;
    }
    .gp-inner { max-width: 560px; width: 100%; }
    .gp-eyebrow {
      font-family: 'Courier Prime', monospace;
      font-size: 10px; letter-spacing: 0.24em;
      color: rgba(184,115,51,0.5);
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .gp-headline {
      font-family: 'Courier Prime', monospace;
      font-size: 22px; font-weight: 400;
      color: rgba(240,236,228,0.72);
      line-height: 1.4;
      margin-bottom: 48px; max-width: 440px;
    }
    .gp-field { margin-bottom: 32px; }
    .gp-label {
      display: block;
      font-family: 'Courier Prime', monospace;
      font-size: 10px; letter-spacing: 0.18em;
      color: rgba(184,115,51,0.65);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .gp-input, .gp-textarea {
      width: 100%; background: transparent;
      border: none; border-bottom: 1px solid rgba(184,115,51,0.22);
      color: #f0ece4;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px; font-weight: 300;
      padding: 4px 0 14px;
      outline: none; line-height: 1.5;
      transition: border-color 0.2s ease;
      resize: none;
    }
    .gp-input::placeholder, .gp-textarea::placeholder { color: rgba(240,236,228,0.18); }
    .gp-input:focus, .gp-textarea:focus { border-bottom-color: rgba(184,115,51,0.5); }
    .gp-btn-row { display: flex; gap: 20px; align-items: center; margin-top: 8px; }
    .gp-save {
      background: none;
      border: 1px solid rgba(184,115,51,0.45);
      color: #b87333;
      font-family: 'Courier Prime', monospace;
      font-size: 12px; letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 12px 36px;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .gp-save:hover:not(:disabled) {
      background: rgba(184,115,51,0.08);
      border-color: #b87333; color: #f0ece4;
    }
    .gp-save:disabled { opacity: 0.4; cursor: not-allowed; }
    .gp-cancel {
      background: none; border: none;
      color: rgba(240,236,228,0.3);
      font-family: 'Courier Prime', monospace;
      font-size: 11px; letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer; padding: 12px 0;
      transition: color 0.15s ease;
    }
    .gp-cancel:hover { color: rgba(240,236,228,0.6); }
    .gp-back {
      border: 1px solid rgba(184,115,51,0.45);
      color: #b87333;
      background: none;
      font-family: 'Courier Prime', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 8px 20px;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .gp-back:hover {
      background: rgba(184,115,51,0.08);
      border-color: #b87333;
      color: #f0ece4;
    }
    .gp-error {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; color: rgba(184,115,51,0.65);
      margin-top: 14px; min-height: 1.4em;
    }
    .gp-input[readonly], .gp-textarea[readonly] {
      opacity: 0.55; cursor: default;
      border-bottom-color: rgba(184,115,51,0.1);
    }
    .gp-admin-divider {
      border: none; border-top: 1px solid rgba(184,115,51,0.12);
      margin: 40px 0 32px;
    }
    .gp-admin-load-label {
      display: block;
      font-family: 'Courier Prime', monospace;
      font-size: 10px; letter-spacing: 0.18em;
      color: rgba(184,115,51,0.5);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .gp-admin-session-input {
      width: 100%; background: transparent;
      border: none; border-bottom: 1px solid rgba(184,115,51,0.18);
      color: #f0ece4; font-family: 'DM Sans', sans-serif;
      font-size: 13px; padding: 4px 0 10px;
      outline: none; transition: border-color 0.2s ease;
    }
    .gp-admin-session-input:focus { border-bottom-color: rgba(184,115,51,0.4); }
    .gp-admin-session-input::placeholder { color: rgba(240,236,228,0.15); }
    .gp-admin-load-btn {
      margin-top: 14px;
      background: none; border: 1px solid rgba(184,115,51,0.28);
      color: rgba(184,115,51,0.7);
      font-family: 'Courier Prime', monospace;
      font-size: 10px; letter-spacing: 0.15em;
      text-transform: uppercase; padding: 7px 18px;
      cursor: pointer; transition: all 0.15s ease;
    }
    .gp-admin-load-btn:hover:not(:disabled) {
      background: rgba(184,115,51,0.08);
      border-color: #b87333; color: #f0ece4;
    }
    .gp-admin-load-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .gp-contacts-list { margin-top: 20px; }
    .gp-contacts-entry {
      padding: 14px 0;
      border-bottom: 1px solid rgba(184,115,51,0.07);
    }
    .gp-contacts-entry-name {
      font-family: 'Courier Prime', monospace;
      font-size: 13px; color: #f0ece4; margin-bottom: 3px;
    }
    .gp-contacts-entry-role {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; color: rgba(240,236,228,0.4); margin-bottom: 6px;
    }
    .gp-contacts-entry-why {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; color: rgba(240,236,228,0.6);
      line-height: 1.5; margin-bottom: 6px;
    }
    .gp-contacts-stage {
      font-family: 'Courier Prime', monospace;
      font-size: 9px; letter-spacing: 0.12em;
      color: rgba(184,115,51,0.65);
      background: rgba(184,115,51,0.06);
      border: 1px solid rgba(184,115,51,0.14);
      border-radius: 2px; padding: 2px 8px;
      text-transform: uppercase; display: inline-block;
    }

    /* ── ADMIN BADGE ── */
    #admin-badge {
      font-family: 'Courier Prime', monospace;
      font-size: 10px; letter-spacing: 0.18em;
      color: #b87333;
      background: rgba(184,115,51,0.12);
      border: 1px solid rgba(184,115,51,0.35);
      border-radius: 2px;
      padding: 3px 10px;
      text-transform: uppercase;
      user-select: none;
    }

    /* ── ADMIN STATS BAR ── */
    .admin-stats-bar {
      display: flex;
      border-bottom: 1px solid rgba(184,115,51,0.10);
      flex-shrink: 0;
    }
    .admin-stat-item {
      flex: 1; padding: 14px 16px;
      border-right: 1px solid rgba(184,115,51,0.08);
      text-align: center;
    }
    .admin-stat-item:last-child { border-right: none; }
    .admin-stat-num {
      font-family: 'Courier Prime', monospace;
      font-size: 18px; font-weight: 700;
      color: #b87333; display: block;
      margin-bottom: 3px;
    }
    .admin-stat-label {
      font-family: 'Courier Prime', monospace;
      font-size: 8px; letter-spacing: 0.16em;
      color: rgba(240,236,228,0.3);
      text-transform: uppercase;
    }

    /* ── APERTURE VIEW ── */
    #aperture-view.active {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .aperture-wrap {
      flex: 1; min-height: 0;
      overflow-y: auto;
      width: 100%;
      padding: 40px 24px 60px;
    }
    .aperture-inner { max-width: 640px; width: 100%; margin: 0 auto; }

    .aperture-fb-label {
      font-family: 'Courier Prime', monospace;
      font-size: 10px; letter-spacing: 0.2em;
      color: rgba(184,115,51,0.55);
      text-transform: uppercase;
      margin-top: 32px; margin-bottom: 14px;
    }
    .aperture-fb-textarea {
      width: 100%; background: transparent;
      border: 1px solid rgba(184,115,51,0.22);
      color: #f0ece4;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; padding: 12px 14px;
      resize: none; outline: none; display: block;
      line-height: 1.6;
      transition: border-color 0.2s ease;
      margin-bottom: 16px;
    }
    .aperture-fb-textarea::placeholder { color: rgba(240,236,228,0.2); }
    .aperture-fb-textarea:focus { border-color: rgba(184,115,51,0.5); }
    .aperture-fb-textarea:disabled { opacity: 0.4; }
    .aperture-fb-btn {
      background: none; border: 1px solid rgba(184,115,51,0.4);
      color: #b87333;
      font-family: 'Courier Prime', monospace;
      font-size: 11px; letter-spacing: 0.18em;
      text-transform: uppercase; padding: 10px 28px;
      cursor: pointer; transition: all 0.15s ease;
    }
    .aperture-fb-btn:hover:not(:disabled) {
      background: rgba(184,115,51,0.08);
      border-color: #b87333; color: #f0ece4;
    }
    .aperture-fb-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .aperture-fb-status {
      font-family: 'Courier Prime', monospace;
      font-size: 11px; color: #b87333;
      letter-spacing: 0.1em; margin-top: 14px; min-height: 1.4em;
    }

    /* ── GLOBAL FEEDBACK BUTTON ── */
    #feedback-copy-btn {
      position: fixed; bottom: 24px; right: 24px; z-index: 999;
      font-family: 'Courier Prime', monospace;
      font-size: 10px; letter-spacing: 0.18em;
      color: rgba(184,115,51,0.5);
      border: 1px solid rgba(184,115,51,0.2);
      padding: 8px 16px;
      background: rgba(10,10,10,0.8);
      cursor: pointer; transition: all 0.15s ease;
      text-transform: uppercase;
    }
    #feedback-copy-btn:hover {
      border-color: rgba(184,115,51,0.5);
      color: #b87333;
    }
    .aperture-eyebrow {
      font-family: 'Courier Prime', monospace;
      font-size: 10px; letter-spacing: 0.22em;
      color: rgba(184,115,51,0.5);
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .aperture-heading {
      font-family: 'Courier Prime', monospace;
      font-size: 48px; font-weight: 700;
      color: #b87333;
      line-height: 1.1; margin-bottom: 20px;
      letter-spacing: 0.06em;
    }
    .aperture-subheading {
      font-family: 'DM Sans', sans-serif;
      font-size: 18px; font-style: italic;
      color: rgba(240,236,228,0.7);
      line-height: 1.5; margin-bottom: 36px;
    }
    .aperture-body {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; color: rgba(240,236,228,0.6);
      line-height: 1.7; margin-bottom: 20px;
    }
    .aperture-closing {
      font-family: 'Courier Prime', monospace;
      font-size: 14px; font-style: italic;
      color: #b87333;
      line-height: 1.5; margin-bottom: 40px;
    }
    .aperture-divider {
      border: none;
      border-top: 1px solid rgba(184,115,51,0.2);
      margin: 0 0 32px;
    }
    .aperture-vote-label {
      font-family: 'Courier Prime', monospace;
      font-size: 10px; letter-spacing: 0.2em;
      color: rgba(184,115,51,0.55);
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .aperture-vote-row {
      display: flex; gap: 16px; align-items: center;
      margin-bottom: 16px;
    }
    .aperture-vote-btn {
      background: none; border: 1px solid rgba(184,115,51,0.3);
      color: rgba(240,236,228,0.7);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px; padding: 10px 20px;
      cursor: pointer; border-radius: 2px;
      transition: all 0.15s ease;
      display: inline-flex; align-items: center; gap: 10px;
    }
    .aperture-vote-btn:hover:not(:disabled) {
      background: rgba(184,115,51,0.08);
      border-color: #b87333;
    }
    .aperture-vote-btn.voted {
      border-color: rgba(184,115,51,0.6);
      background: rgba(184,115,51,0.1);
    }
    .aperture-vote-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .aperture-vote-count {
      font-family: 'Courier Prime', monospace;
      font-size: 12px; color: rgba(240,236,228,0.35);
      letter-spacing: 0.1em;
    }
    .aperture-voted-msg {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; color: rgba(184,115,51,0.6);
      margin-top: 4px; min-height: 1.4em;
    }

    /* ── ADMIN VIEW ── */
    #admin-view { padding: 0; overflow: hidden; }
    #admin-view.active { display: flex; flex-direction: column; }

    /* ── STAGE DROPDOWN ── */
    .panel-stage-select {
      background: #0a0a0a !important;
      color: #f0ece4 !important;
      border: 1px solid rgba(184,115,51,0.25) !important;
      font-family: 'DM Sans', sans-serif !important;
      font-size: 13px !important;
      padding: 8px 10px !important;
      width: 100% !important;
      cursor: pointer !important;
      -webkit-appearance: none !important;
      appearance: none !important;
    }
    .panel-stage-select:hover { border-color: #b87333 !important; color: #b87333 !important; }
    .panel-stage-select:focus { outline: none !important; border-color: #b87333 !important; }
    .panel-stage-select option { background: #0a0a0a; color: #f0ece4; }
    .admin-layout { display: flex; flex: 1; min-height: 0; }
    .admin-left {
      width: 300px; flex-shrink: 0;
      overflow-y: auto;
      padding: 28px 24px;
      border-right: 1px solid rgba(184,115,51,0.10);
    }
    .admin-right { flex: 1; overflow-y: auto; padding: 40px 40px; }
    .admin-eyebrow {
      font-family: 'Courier Prime', monospace;
      font-size: 10px; letter-spacing: 0.24em;
      color: rgba(184,115,51,0.5);
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .admin-count {
      font-family: 'Courier Prime', monospace;
      font-size: 11px; letter-spacing: 0.12em;
      color: rgba(184,115,51,0.4);
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .admin-status {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; color: rgba(240,236,228,0.3);
      padding: 8px 0;
    }
    .admin-row {
      padding: 14px 0;
      border-bottom: 1px solid rgba(184,115,51,0.07);
      cursor: pointer;
    }
    .admin-row:hover { background: rgba(184,115,51,0.05); padding: 14px 8px; margin: 0 -8px; }
    .admin-row.selected { background: rgba(184,115,51,0.09); padding: 14px 8px; margin: 0 -8px; }
    .admin-row.admin-self { border-left: 2px solid rgba(184,115,51,0.45); padding-left: 10px; }
    .admin-row.admin-self .admin-row-name { color: #b87333; }
    .admin-row-name {
      font-family: 'Courier Prime', monospace;
      font-size: 13px; color: #f0ece4;
      margin-bottom: 2px;
    }
    .admin-row-meta {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; color: rgba(240,236,228,0.35);
      margin-bottom: 4px;
    }
    .admin-row-mission {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; color: rgba(240,236,228,0.55);
      line-height: 1.4;
    }
    .admin-empty {
      display: flex; align-items: center; justify-content: center;
      height: 60%;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; color: rgba(240,236,228,0.2);
    }
    .admin-detail-eyebrow {
      font-family: 'Courier Prime', monospace;
      font-size: 10px; letter-spacing: 0.24em;
      color: rgba(184,115,51,0.5);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .admin-detail-name {
      font-family: 'Courier Prime', monospace;
      font-size: 22px; font-weight: 400;
      color: #f0ece4;
      margin-bottom: 36px;
    }
    .admin-detail-field { margin-bottom: 24px; }
    .admin-detail-label {
      font-family: 'Courier Prime', monospace;
      font-size: 9px; letter-spacing: 0.2em;
      color: rgba(184,115,51,0.55);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .admin-detail-value {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; color: rgba(240,236,228,0.75);
      line-height: 1.6;
    }
    .admin-detail-value.mono {
      font-family: 'Courier Prime', monospace;
      font-size: 12px; color: rgba(240,236,228,0.4);
      word-break: break-all;
    }
    .admin-contacts-heading {
      font-family: 'Courier Prime', monospace;
      font-size: 10px; letter-spacing: 0.18em;
      color: rgba(184,115,51,0.5);
      text-transform: uppercase;
      margin: 40px 0 16px;
      padding-top: 32px;
      border-top: 1px solid rgba(184,115,51,0.10);
    }
    .admin-contact-row {
      padding: 12px 0;
      border-bottom: 1px solid rgba(184,115,51,0.06);
    }
    .admin-contact-name {
      font-family: 'Courier Prime', monospace;
      font-size: 13px; color: #f0ece4;
      margin-bottom: 2px;
    }
    .admin-contact-role {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; color: rgba(240,236,228,0.4);
      margin-bottom: 6px;
    }
    .admin-contact-stage {
      font-family: 'Courier Prime', monospace;
      font-size: 9px; letter-spacing: 0.12em;
      color: rgba(184,115,51,0.65);
      background: rgba(184,115,51,0.06);
      border: 1px solid rgba(184,115,51,0.14);
      border-radius: 2px; padding: 2px 8px;
      text-transform: uppercase; display: inline-block;
    }
    @media (max-width: 700px) {
      .admin-layout { flex-direction: column; height: auto; }
      .admin-left { width: 100%; border-right: none; border-bottom: 1px solid rgba(184,115,51,0.10); }
      .admin-right { padding: 24px 16px; }
    }

    /* ── ORBIT SIDE LIST ── */
    #orbit-list-panel {
      position: fixed;
      top: 56px; left: 0;
      width: 260px;
      height: calc(100vh - 56px);
      background: rgba(10,10,10,0.96);
      border-right: 1px solid rgba(184,115,51,0.15);
      z-index: 5;
      display: flex; flex-direction: column;
      transform: translateX(-260px);
      transition: transform 0.25s ease;
      visibility: hidden;
    }
    #orbit-list-panel.ol-visible { visibility: visible; }
    #orbit-list-panel.ol-open { transform: translateX(0); }

    #orbit-list-toggle {
      position: fixed;
      top: 50%; left: 0;
      transform: translateY(-50%);
      background: rgba(10,10,10,0.9);
      border: 1px solid rgba(184,115,51,0.35);
      border-left: none;
      color: #b87333;
      font-family: 'Courier Prime', monospace;
      font-size: 10px; letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 10px 8px;
      cursor: pointer; z-index: 6;
      writing-mode: vertical-rl;
      transition: left 0.25s ease, background 0.15s ease;
      display: none;
    }
    #orbit-list-toggle.ol-visible { display: block; }
    #orbit-list-toggle.ol-shifted { left: 260px; }
    #orbit-list-toggle:hover { background: rgba(184,115,51,0.08); border-color: #b87333; }

    .ol-header {
      font-family: 'Courier Prime', monospace;
      font-size: 10px; letter-spacing: 0.22em;
      color: #b87333; text-transform: uppercase;
      padding: 18px 16px 14px;
      border-bottom: 1px solid rgba(184,115,51,0.1);
      flex-shrink: 0;
    }
    .ol-filter-wrap {
      padding: 10px 16px;
      border-bottom: 1px solid rgba(184,115,51,0.08);
      flex-shrink: 0;
    }
    .ol-filter-input {
      width: 100%; background: transparent;
      border: none; border-bottom: 1px solid rgba(184,115,51,0.22);
      color: #f0ece4; font-family: 'DM Sans', sans-serif;
      font-size: 13px; padding: 6px 0; outline: none;
    }
    .ol-filter-input::placeholder { color: rgba(240,236,228,0.25); }
    .ol-filter-input:focus { border-bottom-color: rgba(184,115,51,0.5); }

    .ol-stage-row {
      display: flex; flex-wrap: wrap; gap: 4px;
      padding: 8px 16px;
      border-bottom: 1px solid rgba(184,115,51,0.08);
      flex-shrink: 0;
    }
    .ol-stage-btn {
      background: none;
      border: 1px solid rgba(184,115,51,0.2);
      color: rgba(184,115,51,0.45);
      font-family: 'Courier Prime', monospace;
      font-size: 9px; letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 6px; cursor: pointer;
      white-space: nowrap; transition: all 0.12s ease;
    }
    .ol-stage-btn.active {
      border-color: #b87333; color: #b87333;
      background: rgba(184,115,51,0.08);
    }
    .ol-contacts { flex: 1; overflow-y: auto; padding: 4px 0; }
    .ol-contact-row {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 9px 16px; cursor: pointer; gap: 8px;
      transition: background 0.1s ease;
    }
    .ol-contact-row:hover { background: rgba(184,115,51,0.06); }
    .ol-contact-name {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; color: #f0ece4;
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; flex: 1; min-width: 0;
    }
    .ol-contact-stage {
      font-family: 'Courier Prime', monospace;
      font-size: 9px; letter-spacing: 0.07em;
      color: rgba(184,115,51,0.45);
      text-transform: uppercase; flex-shrink: 0;
    }
    .ol-empty {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; color: rgba(240,236,228,0.25);
      padding: 24px 16px; text-align: center;
    }
    .ol-footer {
      padding: 12px 16px;
      border-top: 1px solid rgba(184,115,51,0.1);
      font-family: 'Courier Prime', monospace;
      font-size: 10px; letter-spacing: 0.1em;
      color: rgba(184,115,51,0.35);
      text-transform: uppercase; flex-shrink: 0;
    }

    @media (max-width: 700px) {
      #orbit-list-panel {
        top: auto; bottom: 0; left: 0; right: 0;
        width: 100%; height: 55vh;
        border-right: none;
        border-top: 1px solid rgba(184,115,51,0.15);
        transform: translateY(100%);
      }
      #orbit-list-panel.ol-open { transform: translateY(0); }
      #orbit-list-toggle {
        top: auto; bottom: 16px;
        left: 50% !important;
        transform: translateX(-50%);
        writing-mode: horizontal-tb;
        border: 1px solid rgba(184,115,51,0.35);
        transition: background 0.15s ease;
      }
      #orbit-list-toggle.ol-shifted { left: 50% !important; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-wordmark" data-view="orbit">
      <svg class="nav-atom" width="20" height="20" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <circle cx="16" cy="16" r="2.8" fill="#b87333"/>
        <ellipse cx="16" cy="16" rx="13" ry="4.5" fill="none" stroke="#b87333" stroke-width="1.3"/>
        <ellipse cx="16" cy="16" rx="13" ry="4.5" fill="none" stroke="#b87333" stroke-width="1.3" transform="rotate(60 16 16)"/>
        <ellipse cx="16" cy="16" rx="13" ry="4.5" fill="none" stroke="#b87333" stroke-width="1.3" transform="rotate(120 16 16)"/>
      </svg>
      ORBIT
    </a>
    <ul class="nav-links">
      <li><a data-view="orbit"  class="active">ORBIT</a></li>
      <li><a data-view="search">SEARCH</a></li>
      <li><a data-view="suggest">SUGGEST</a></li>
      <li><a data-view="aperture">APERTURE</a></li>
      <li><a data-view="admin" id="admin-nav-link" hidden>ADMIN</a></li>
      <li><button id="gravity-profile-link">Gravity Profile</button></li>
    </ul>
    <span id="admin-badge" hidden>ADMIN</span>
  </nav>

  <main>
    <div id="orbit-view"  class="view active"></div>
    <div id="search-view"  class="view"></div>
    <div id="suggest-view" class="view"></div>
    <div id="admin-view"   class="view"></div>
    <div id="aperture-view" class="view"></div>
  </main>

  <script>
    // Admin mode: ?admin=true. Code entered via UI, never in URL.
    window.ORBIT_ADMIN = false
    window.ORBIT_ADMIN_PENDING = false
    ;(function() {
      var params = new URLSearchParams(location.search)
      if (params.get('admin') !== 'true') return

      // Already verified this session — activate immediately
      if (sessionStorage.getItem('admin_verified') === 'true') {
        window.ORBIT_ADMIN = true
        document.getElementById('admin-badge').hidden = false
        document.getElementById('admin-nav-link').hidden = false
        return
      }

      // Show code entry screen — blocks onboarding and nav
      window.ORBIT_ADMIN_PENDING = true
      var nav = document.querySelector('nav')
      if (nav) nav.style.display = 'none'

      // Inject shake keyframe
      var ks = document.createElement('style')
      ks.textContent = '@keyframes aco-shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}'
      document.head.appendChild(ks)

      var overlay = document.createElement('div')
      overlay.id = 'admin-code-overlay'
      overlay.style.cssText = 'position:fixed;inset:0;z-index:300;background:#0a0a0a;display:flex;align-items:center;justify-content:center;padding:24px;'

      var inner = document.createElement('div')
      inner.style.cssText = 'max-width:400px;width:100%;'

      var eyebrow = document.createElement('div')
      eyebrow.style.cssText = 'font-family:"Courier Prime",monospace;font-size:10px;letter-spacing:0.24em;color:rgba(184,115,51,0.5);text-transform:uppercase;margin-bottom:32px;'
      eyebrow.textContent = 'ORBIT'

      var heading = document.createElement('div')
      heading.style.cssText = 'font-family:"Courier Prime",monospace;font-size:22px;font-weight:400;color:rgba(240,236,228,0.72);margin-bottom:40px;'
      heading.textContent = 'Admin Access'

      var codeInput = document.createElement('input')
      codeInput.type = 'password'
      codeInput.placeholder = 'Enter access code'
      codeInput.style.cssText = 'width:100%;background:transparent;border:none;border-bottom:1px solid rgba(184,115,51,0.22);color:#f0ece4;font-family:"DM Sans",sans-serif;font-size:16px;font-weight:300;padding:4px 0 14px;outline:none;display:block;margin-bottom:28px;transition:border-color 0.2s;'

      var btn = document.createElement('button')
      btn.textContent = 'Enter'
      btn.style.cssText = 'background:none;border:1px solid rgba(184,115,51,0.45);color:#b87333;font-family:"Courier Prime",monospace;font-size:12px;letter-spacing:0.18em;text-transform:uppercase;padding:12px 36px;cursor:pointer;'

      var errorEl = document.createElement('div')
      errorEl.style.cssText = 'font-family:"DM Sans",sans-serif;font-size:12px;color:rgba(184,115,51,0.65);margin-top:14px;min-height:1.4em;'

      inner.appendChild(eyebrow)
      inner.appendChild(heading)
      inner.appendChild(codeInput)
      inner.appendChild(btn)
      inner.appendChild(errorEl)
      overlay.appendChild(inner)
      document.body.appendChild(overlay)
      setTimeout(function() { codeInput.focus() }, 60)

      function submit() {
        var code = codeInput.value
        if (!code) return
        btn.disabled = true
        errorEl.textContent = ''
        fetch('/api/admin-auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: code }),
        })
        .then(function(r) { return r.json() })
        .then(function(data) {
          if (data.ok) {
            sessionStorage.setItem('admin_verified', 'true')
            sessionStorage.setItem('orbit_admin_code', code)
            var url = new URL(location.href)
            url.searchParams.delete('code')
            location.replace(url.toString())
          } else {
            codeInput.style.animation = 'none'
            void codeInput.offsetHeight
            codeInput.style.animation = 'aco-shake 0.35s ease'
            errorEl.textContent = 'Invalid code.'
            codeInput.value = ''
            codeInput.focus()
            btn.disabled = false
          }
        })
        .catch(function() {
          errorEl.textContent = 'Connection error. Try again.'
          btn.disabled = false
        })
      }

      btn.addEventListener('click', submit)
      codeInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') submit() })
    })()

    // Guest mode: ?guest=true limits to 1 search + 1 suggest then captures email
    window.ORBIT_GUEST = new URLSearchParams(location.search).get('guest') === 'true'

    // Session gate: resolved by onboarding-view.js when identity is ready
    ;(function() {
      var _res
      window.ORBIT_SESSION_PROMISE = new Promise(function(r) { _res = r })
      window._orbitSessionResolve = _res
    })()

    window.showGravityProfile = function() {
      if (document.getElementById('gravity-profile-modal')) return

      var isAdmin = window.ORBIT_ADMIN
      var sessionId = localStorage.getItem('orbit_session_id') || ''
      var identity = window.ORBIT_IDENTITY
        || (function() { try { return JSON.parse(localStorage.getItem('orbit_identity') || 'null') } catch { return null } })()
        || {}

      var overlay = document.createElement('div')
      overlay.id = 'gravity-profile-modal'
      overlay.className = 'gp-overlay'

      var inner = document.createElement('div')
      inner.className = 'gp-inner'

      var eyebrow = document.createElement('div')
      eyebrow.className = 'gp-eyebrow'
      eyebrow.textContent = isAdmin ? 'ADMIN — GRAVITY PROFILE' : 'GRAVITY PROFILE'

      var headline = document.createElement('div')
      headline.className = 'gp-headline'
      headline.textContent = isAdmin
        ? 'Your profile. Click Edit Profile to make changes.'
        : 'Your identity shapes every search and suggestion.'

      var FIELDS = [
        { key: 'name',        label: 'Name',                                               placeholder: 'First and last name',                        type: 'input'    },
        { key: 'mission',     label: 'What are you working on?',                           placeholder: '2–3 sentences.',                              type: 'textarea' },
        { key: 'north_stars', label: 'What do you want to be known for?',                 placeholder: 'The work, the idea, the reputation.',          type: 'input'    },
        { key: 'worldview',   label: 'What kind of thinking partner are you looking for?', placeholder: 'Someone who can challenge, co-think, build.',  type: 'textarea' },
        { key: 'email',       label: 'Your email (optional)',                              placeholder: 'For saving your orbit across devices',         type: 'email'    },
      ]

      var inputs = {}
      inner.appendChild(eyebrow)
      inner.appendChild(headline)

      FIELDS.forEach(function(f) {
        var fieldEl = document.createElement('div')
        fieldEl.className = 'gp-field'
        var label = document.createElement('label')
        label.className = 'gp-label'
        label.textContent = f.label
        var input = f.type === 'textarea'
          ? document.createElement('textarea')
          : document.createElement('input')
        input.className = f.type === 'textarea' ? 'gp-textarea' : 'gp-input'
        input.placeholder = f.placeholder
        if (f.type === 'textarea') input.rows = 3
        if (f.type === 'email') input.type = 'email'
        if (f.key === 'north_stars') {
          var ns = identity.north_stars
          input.value = Array.isArray(ns) ? ns.join(', ') : (ns || '')
        } else {
          input.value = identity[f.key] || ''
        }
        if (isAdmin && sessionId !== 'admin') input.readOnly = true
        inputs[f.key] = input
        fieldEl.appendChild(label)
        fieldEl.appendChild(input)
        inner.appendChild(fieldEl)
      })

      var btnRow = document.createElement('div')
      btnRow.className = 'gp-btn-row'
      var errorEl = document.createElement('div')
      errorEl.className = 'gp-error'

      if (!isAdmin || sessionId === 'admin') {
        var saveBtn = document.createElement('button')
        saveBtn.className = 'gp-save'
        saveBtn.textContent = 'Save Profile'
        saveBtn.addEventListener('click', async function() {
          var name    = inputs.name.value.trim()
          var mission = inputs.mission.value.trim()
          if (!name || !mission) { errorEl.textContent = 'Name and what you\'re working on are required.'; return }
          saveBtn.disabled = true
          saveBtn.textContent = 'Saving...'
          errorEl.textContent = ''
          var northRaw = inputs.north_stars.value.trim()
          var newEmail = inputs.email.value.trim()
          var updated = Object.assign({}, identity, {
            name: name, mission: mission,
            north_stars: northRaw ? [northRaw] : [],
            worldview: inputs.worldview.value.trim(),
            email: newEmail,
          })
          var emailChanged = newEmail && newEmail !== (identity.email || '')
          window.ORBIT_IDENTITY = updated
          try { localStorage.setItem('orbit_identity', JSON.stringify(updated)) } catch {}
          if (sessionId) {
            try {
              await fetch('/api/identity', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId: sessionId, identity: updated, sendUpdate: emailChanged }),
              })
            } catch {}
          }
          overlay.remove()
        })
        btnRow.appendChild(saveBtn)
      }

      var closeBtn = document.createElement('button')
      closeBtn.className = 'gp-cancel'
      closeBtn.textContent = isAdmin ? 'Close' : 'Cancel'
      closeBtn.addEventListener('click', function() { overlay.remove() })
      btnRow.appendChild(closeBtn)
      inner.appendChild(btnRow)
      inner.appendChild(errorEl)

      // ── Admin: load another user by session ID ──
      if (isAdmin) {
        var divider = document.createElement('hr')
        divider.className = 'gp-admin-divider'
        inner.appendChild(divider)

        var loadLabel = document.createElement('span')
        loadLabel.className = 'gp-admin-load-label'
        loadLabel.textContent = 'View Another User'

        var sessionInput = document.createElement('input')
        sessionInput.className = 'gp-admin-session-input'
        sessionInput.type = 'text'
        sessionInput.placeholder = 'Paste session ID (orbit_session_id)…'

        var loadBtn = document.createElement('button')
        loadBtn.className = 'gp-admin-load-btn'
        loadBtn.textContent = 'Load Profile'

        var loadStatus = document.createElement('div')
        loadStatus.className = 'gp-error'

        var contactsArea = document.createElement('div')
        contactsArea.className = 'gp-contacts-list'

        loadBtn.addEventListener('click', async function() {
          var sid = sessionInput.value.trim()
          if (!sid) return
          loadBtn.disabled = true
          loadBtn.textContent = 'Loading…'
          loadStatus.textContent = ''
          contactsArea.innerHTML = ''

          try {
            var results = await Promise.all([
              fetch('/api/identity?sessionId=' + encodeURIComponent(sid)),
              fetch('/api/contacts-kv?sessionId=' + encodeURIComponent(sid)),
            ])
            var loadedIdentity = results[0].ok ? await results[0].json() : null
            var loadedContacts = results[1].ok ? await results[1].json() : []

            if (!loadedIdentity || typeof loadedIdentity !== 'object') {
              loadStatus.textContent = 'No profile found for that session ID.'
              loadBtn.disabled = false; loadBtn.textContent = 'Load Profile'
              return
            }

            FIELDS.forEach(function(f) {
              var v = f.key === 'north_stars'
                ? (Array.isArray(loadedIdentity.north_stars) ? loadedIdentity.north_stars.join(', ') : (loadedIdentity.north_stars || ''))
                : (loadedIdentity[f.key] || '')
              inputs[f.key].value = v
            })
            eyebrow.textContent = 'ADMIN — VIEWING: ' + (loadedIdentity.name || sid.slice(0, 8) + '…')

            if (Array.isArray(loadedContacts) && loadedContacts.length > 0) {
              var cLabel = document.createElement('span')
              cLabel.className = 'gp-admin-load-label'
              cLabel.style.marginTop = '20px'
              cLabel.textContent = 'Their Orbit — ' + loadedContacts.length + ' contact' + (loadedContacts.length === 1 ? '' : 's')
              contactsArea.appendChild(cLabel)

              loadedContacts.forEach(function(c) {
                var entry = document.createElement('div')
                entry.className = 'gp-contacts-entry'
                var nameEl = document.createElement('div')
                nameEl.className = 'gp-contacts-entry-name'
                nameEl.textContent = c.name || '—'
                var roleEl = document.createElement('div')
                roleEl.className = 'gp-contacts-entry-role'
                roleEl.textContent = c.role || ''
                var whyEl = document.createElement('div')
                whyEl.className = 'gp-contacts-entry-why'
                whyEl.textContent = c.why || ''
                var stageEl = document.createElement('span')
                stageEl.className = 'gp-contacts-stage'
                stageEl.textContent = c.status || 'IDENTIFIED'
                entry.appendChild(nameEl)
                if (c.role) entry.appendChild(roleEl)
                if (c.why) entry.appendChild(whyEl)
                entry.appendChild(stageEl)
                contactsArea.appendChild(entry)
              })
            } else {
              var emptyEl = document.createElement('div')
              emptyEl.style.cssText = 'font-family:"DM Sans",sans-serif;font-size:13px;color:rgba(240,236,228,0.3);padding:16px 0;'
              emptyEl.textContent = 'No contacts in their orbit yet.'
              contactsArea.appendChild(emptyEl)
            }

            loadBtn.disabled = false; loadBtn.textContent = 'Load Profile'
          } catch {
            loadStatus.textContent = 'Failed to load. Check the session ID.'
            loadBtn.disabled = false; loadBtn.textContent = 'Load Profile'
          }
        })

        inner.appendChild(loadLabel)
        inner.appendChild(sessionInput)
        inner.appendChild(loadBtn)
        inner.appendChild(loadStatus)
        inner.appendChild(contactsArea)
      }

      overlay.appendChild(inner)
      document.body.appendChild(overlay)
    }

    window.showGuestModal = function() {
      if (document.getElementById('guest-modal')) return

      const now = Date.now()
      const WEEK = 7 * 24 * 60 * 60 * 1000
      const lastSearch = parseInt(localStorage.getItem('guest_search_timestamp') || '0')
      const lastSuggest = parseInt(localStorage.getItem('guest_suggest_timestamp') || '0')
      const searchUsed = now - lastSearch < WEEK
      const suggestUsed = now - lastSuggest < WEEK

      let msgText
      if (suggestUsed && !searchUsed) {
        msgText = 'You\'ve used your free suggestion this week. You have 1 free search remaining.'
      } else if (searchUsed && !suggestUsed) {
        msgText = 'You\'ve used your free search this week. You have 1 free suggestion remaining.'
      } else {
        msgText = 'You\'ve used your free searches for this week. Leave your email to get early access — your orbit will be waiting exactly where you left off.'
      }

      const daysLeft = Math.ceil((WEEK - (now - Math.max(lastSearch, lastSuggest))) / (24 * 60 * 60 * 1000))

      const overlay = document.createElement('div')
      overlay.id = 'guest-modal'
      overlay.className = 'guest-modal-overlay'

      const card = document.createElement('div')
      card.className = 'guest-modal-card'

      const eyebrow = document.createElement('div')
      eyebrow.className = 'guest-modal-eyebrow'
      eyebrow.textContent = 'ORBIT'

      const msg = document.createElement('p')
      msg.className = 'guest-modal-msg'
      msg.textContent = msgText

      const resetNote = document.createElement('p')
      resetNote.style.cssText = 'font-family:DM Sans,sans-serif; font-size:12px; color:rgba(240,236,228,0.3); margin-bottom:20px; margin-top:-12px;'
      resetNote.textContent = 'Resets in ' + daysLeft + ' day' + (daysLeft === 1 ? '' : 's') + '.'

      const input = document.createElement('input')
      input.type = 'email'
      input.placeholder = 'your@email.com'
      input.className = 'guest-modal-input'

      const btn = document.createElement('button')
      btn.className = 'guest-modal-btn'
      btn.textContent = 'Notify Me'

      const status = document.createElement('div')
      status.className = 'guest-modal-status'

      btn.addEventListener('click', async () => {
        const email = input.value.trim()
        if (!email || !email.includes('@')) { input.focus(); return }
        btn.disabled = true
        btn.textContent = 'Sending...'
        try {
          const orbitData = JSON.parse(localStorage.getItem('orbit_contacts') || '[]')
          await fetch('/api/guest-email', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, orbitData }),
          })
          localStorage.setItem('guest_email', email)
          overlay.remove()
        } catch {
          btn.disabled = false
          btn.textContent = 'Notify Me'
          status.textContent = 'Something went wrong. Try again.'
        }
      })

      var backBtn = document.createElement('button')
      backBtn.textContent = '← Not now'
      backBtn.style.cssText = 'display:block; margin-top:16px; background:none; border:1px solid rgba(184,115,51,0.3); color:rgba(184,115,51,0.6); font-family:Courier Prime,monospace; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; padding:8px 20px; cursor:pointer; width:100%;'
      backBtn.addEventListener('click', () => overlay.remove())
      backBtn.addEventListener('mouseenter', () => backBtn.style.borderColor = '#b87333')
      backBtn.addEventListener('mouseleave', () => backBtn.style.borderColor = 'rgba(184,115,51,0.3)')

      card.appendChild(eyebrow)
      card.appendChild(msg)
      card.appendChild(resetNote)
      card.appendChild(input)
      card.appendChild(btn)
      card.appendChild(status)
      card.appendChild(backBtn)
      overlay.appendChild(card)
      document.body.appendChild(overlay)
    }
  </script>

  <script type="module">
    const links = document.querySelectorAll('[data-view]')
    const views = document.querySelectorAll('.view')

    function activate(viewId) {
      links.forEach(l => l.classList.toggle('active', l.dataset.view === viewId))
      views.forEach(v => v.classList.toggle('active', v.id === `${viewId}-view`))
    }

    links.forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault()
        activate(link.dataset.view)
        if (link.dataset.view === 'admin' && window.ORBIT_ADMIN) initAdminView()
        if (link.dataset.view === 'aperture') initApertureView()
      })
    })

    document.getElementById('gravity-profile-link')?.addEventListener('click', () => {
      window.showGravityProfile?.()
    })

    let adminLoaded = false
    async function initAdminView() {
      if (adminLoaded) return
      adminLoaded = true
      const container = document.getElementById('admin-view')
      container.innerHTML = ''

      // Stats bar
      const statsBar = document.createElement('div')
      statsBar.className = 'admin-stats-bar'
      container.appendChild(statsBar)
      const code = sessionStorage.getItem('orbit_admin_code') || ''
      fetch(`/api/admin-auth?action=stats&code=${encodeURIComponent(code)}`)
        .then(r => r.ok ? r.json() : null)
        .then(stats => {
          if (!stats) return
          const items = [
            { num: stats.orbitsBuilt,    label: 'Orbits Built' },
            { num: stats.searches,       label: 'Searches' },
            { num: stats.suggests,       label: 'Suggests' },
            { num: stats.contactsAdded,  label: 'Contacts' },
            { num: stats.guests,         label: 'Guests' },
            { num: `${stats.apertureUpvotes}/${stats.apertureDownvotes}`, label: 'Aperture' },
          ]
          items.forEach(item => {
            const el = document.createElement('div')
            el.className = 'admin-stat-item'
            const num = document.createElement('span')
            num.className = 'admin-stat-num'
            num.textContent = item.num
            const label = document.createElement('span')
            label.className = 'admin-stat-label'
            label.textContent = item.label
            el.appendChild(num)
            el.appendChild(label)
            statsBar.appendChild(el)
          })
        })
        .catch(() => { statsBar.remove() })

      const layout = document.createElement('div')
      layout.className = 'admin-layout'

      const leftEl = document.createElement('div')
      leftEl.className = 'admin-left'

      const eyebrow = document.createElement('div')
      eyebrow.className = 'admin-eyebrow'
      eyebrow.textContent = 'ORBIT — ADMIN'

      const statusEl = document.createElement('div')
      statusEl.className = 'admin-status'
      statusEl.textContent = 'Loading…'

      leftEl.appendChild(eyebrow)
      leftEl.appendChild(statusEl)

      const rightEl = document.createElement('div')
      rightEl.className = 'admin-right'

      const emptyEl = document.createElement('div')
      emptyEl.className = 'admin-empty'
      emptyEl.textContent = 'Select a profile.'
      rightEl.appendChild(emptyEl)

      layout.appendChild(leftEl)
      layout.appendChild(rightEl)
      container.appendChild(layout)

      try {
        const r = await fetch(`/api/admin-auth?action=list&code=${encodeURIComponent(code)}`)
        if (!r.ok) throw new Error('Unauthorized')
        const { profiles } = await r.json()
        statusEl.remove()

        const countEl = document.createElement('div')
        countEl.className = 'admin-count'
        countEl.textContent = `${profiles.length} gravity profile${profiles.length === 1 ? '' : 's'}`
        leftEl.appendChild(countEl)

        profiles.forEach(p => {
          const row = document.createElement('div')
          row.className = 'admin-row' + (p.sessionId === 'admin' ? ' admin-self' : '')

          const nameEl = document.createElement('div')
          nameEl.className = 'admin-row-name'
          nameEl.textContent = p.name || '—'

          const metaParts = []
          if (p.email) metaParts.push(p.email)
          if (p.created_at) metaParts.push(new Date(p.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }))
          const metaEl = document.createElement('div')
          metaEl.className = 'admin-row-meta'
          metaEl.textContent = metaParts.join(' · ')

          row.appendChild(nameEl)
          if (metaParts.length) row.appendChild(metaEl)
          if (p.mission) {
            const missionEl = document.createElement('div')
            missionEl.className = 'admin-row-mission'
            missionEl.textContent = p.mission.length > 60 ? p.mission.slice(0, 60) + '…' : p.mission
            row.appendChild(missionEl)
          }

          row.addEventListener('click', () => {
            document.querySelectorAll('.admin-row').forEach(r => r.classList.remove('selected'))
            row.classList.add('selected')
            loadAdminProfile(p.sessionId, rightEl)
          })
          leftEl.appendChild(row)
        })
      } catch {
        statusEl.textContent = 'Failed to load profiles.'
      }
    }

    async function loadAdminProfile(sessionId, rightEl) {
      rightEl.innerHTML = ''
      const loadingEl = document.createElement('div')
      loadingEl.className = 'admin-empty'
      loadingEl.textContent = 'Loading…'
      rightEl.appendChild(loadingEl)

      try {
        const code = sessionStorage.getItem('orbit_admin_code') || ''
        const [idRes, cRes] = await Promise.all([
          fetch(`/api/identity?sessionId=${encodeURIComponent(sessionId)}`),
          fetch(`/api/admin-auth?action=contacts&sessionId=${encodeURIComponent(sessionId)}&code=${encodeURIComponent(code)}`),
        ])
        const identity = idRes.ok ? await idRes.json() : {}
        const contacts = cRes.ok ? await cRes.json() : []
        rightEl.innerHTML = ''

        const eyebrow = document.createElement('div')
        eyebrow.className = 'admin-detail-eyebrow'
        eyebrow.textContent = 'ORBIT — GRAVITY PROFILE'

        const nameEl = document.createElement('div')
        nameEl.className = 'admin-detail-name'
        nameEl.textContent = identity.name || '—'

        rightEl.appendChild(eyebrow)
        rightEl.appendChild(nameEl)

        const fields = [
          { label: 'Email',              value: identity.email || '—',                                                                    mono: true  },
          { label: 'Mission',            value: identity.mission || '—'                                                                               },
          { label: 'Desired reputation', value: Array.isArray(identity.north_stars) ? identity.north_stars.join(', ') : (identity.north_stars || '—') },
          { label: 'Thinking partner',   value: identity.worldview || '—'                                                                             },
          { label: 'EWS story',          value: identity.ews_story || '—'                                                                             },
          { label: 'Session ID',         value: sessionId,                                                                                mono: true  },
        ]
        fields.forEach(f => {
          const fieldEl = document.createElement('div')
          fieldEl.className = 'admin-detail-field'
          const labelEl = document.createElement('div')
          labelEl.className = 'admin-detail-label'
          labelEl.textContent = f.label
          const valueEl = document.createElement('div')
          valueEl.className = 'admin-detail-value' + (f.mono ? ' mono' : '')
          valueEl.textContent = f.value
          fieldEl.appendChild(labelEl)
          fieldEl.appendChild(valueEl)
          rightEl.appendChild(fieldEl)
        })

        if (sessionId === 'admin') {
          const editBtn = document.createElement('button')
          editBtn.className = 'gp-save'
          editBtn.style.cssText = 'margin-top:16px; width:100%; border:1px solid #b87333; color:#b87333; background:none; font-family:Courier Prime,monospace; font-size:12px; letter-spacing:0.18em; text-transform:uppercase; padding:12px 24px; cursor:pointer;'
          editBtn.textContent = 'Edit Profile'
          editBtn.addEventListener('click', () => {
            const gpView = document.querySelector('[data-view="gravity-profile"]')
            if (gpView) gpView.click()
            else {
              const event = new CustomEvent('orbit:edit-profile', { detail: { editable: true } })
              document.dispatchEvent(event)
            }
          })
          rightEl.appendChild(editBtn)
        }

        const contactsHeading = document.createElement('div')
        contactsHeading.className = 'admin-contacts-heading'
        contactsHeading.textContent = `Orbit — ${Array.isArray(contacts) ? contacts.length : 0} contact${contacts.length === 1 ? '' : 's'}`
        rightEl.appendChild(contactsHeading)

        if (!Array.isArray(contacts) || contacts.length === 0) {
          const emptyEl = document.createElement('div')
          emptyEl.style.cssText = 'font-family:"DM Sans",sans-serif;font-size:13px;color:rgba(240,236,228,0.25);padding:12px 0;'
          emptyEl.textContent = 'No contacts in orbit yet.'
          rightEl.appendChild(emptyEl)
        } else {
          contacts.forEach(c => {
            const row = document.createElement('div')
            row.className = 'admin-contact-row'

            const cName = document.createElement('div')
            cName.className = 'admin-contact-name'
            cName.textContent = c.name || '—'

            const roleParts = []
            if (c.role) roleParts.push(c.role)
            if (c.date_added) roleParts.push(new Date(c.date_added).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }))
            if (roleParts.length) {
              const roleEl = document.createElement('div')
              roleEl.className = 'admin-contact-role'
              roleEl.textContent = roleParts.join(' · ')
              row.appendChild(cName)
              row.appendChild(roleEl)
            } else {
              row.appendChild(cName)
            }

            const stageEl = document.createElement('span')
            stageEl.className = 'admin-contact-stage'
            stageEl.textContent = c.status || 'IDENTIFIED'
            row.appendChild(stageEl)

            rightEl.appendChild(row)
          })
        }
      } catch {
        rightEl.innerHTML = ''
        const errEl = document.createElement('div')
        errEl.className = 'admin-empty'
        errEl.textContent = 'Failed to load profile.'
        rightEl.appendChild(errEl)
      }
    }

    let apertureLoaded = false
    function initApertureView() {
      if (apertureLoaded) return
      apertureLoaded = true
      const container = document.getElementById('aperture-view')

      const wrap = document.createElement('div')
      wrap.className = 'aperture-wrap'
      const inner = document.createElement('div')
      inner.className = 'aperture-inner'

      const eyebrow = document.createElement('div')
      eyebrow.className = 'aperture-eyebrow'
      eyebrow.textContent = 'COMING SOON'

      const heading = document.createElement('div')
      heading.className = 'aperture-heading'
      heading.textContent = 'APERTURE'

      const subheading = document.createElement('div')
      subheading.className = 'aperture-subheading'
      subheading.textContent = 'Most people build networks around industry. APERTURE builds networks around attention.'

      const body1 = document.createElement('div')
      body1.className = 'aperture-body'
      body1.textContent = "You've noticed something shifting. You can't fully name it yet. But you keep seeing it — in different places, different contexts, different forms."

      const body2 = document.createElement('div')
      body2.className = 'aperture-body'
      body2.textContent = 'APERTURE finds the people already watching the same change. Not because they share your profession. Because they share your perception.'

      const body3 = document.createElement('div')
      body3.className = 'aperture-body'
      body3.textContent = 'A fiction writer, an epidemiologist, an architect, and a policy analyst can notice the same fracture forming — from completely different vantage points. That collision of perspectives is where the insight lives.'

      const closing = document.createElement('div')
      closing.className = 'aperture-closing'
      closing.textContent = 'You are not alone in noticing. You just haven’t found the others yet.'

      const divider = document.createElement('hr')
      divider.className = 'aperture-divider'

      const voteLabel = document.createElement('div')
      voteLabel.className = 'aperture-vote-label'

      const voteRow = document.createElement('div')
      voteRow.className = 'aperture-vote-row'

      const upCount = document.createElement('span')
      upCount.className = 'aperture-vote-count'
      upCount.textContent = '—'
      const upBtn = document.createElement('button')
      upBtn.className = 'aperture-vote-btn'
      upBtn.appendChild(document.createTextNode('👍 '))
      upBtn.appendChild(upCount)

      const downCount = document.createElement('span')
      downCount.className = 'aperture-vote-count'
      downCount.textContent = '—'
      const downBtn = document.createElement('button')
      downBtn.className = 'aperture-vote-btn'
      downBtn.appendChild(document.createTextNode('👎 '))
      downBtn.appendChild(downCount)

      const votedMsg = document.createElement('div')
      votedMsg.className = 'aperture-voted-msg'

      voteRow.appendChild(upBtn)
      voteRow.appendChild(downBtn)

      inner.appendChild(eyebrow)
      inner.appendChild(heading)
      inner.appendChild(subheading)
      inner.appendChild(body1)
      inner.appendChild(body2)
      inner.appendChild(body3)
      inner.appendChild(closing)
      inner.appendChild(divider)
      inner.appendChild(voteLabel)
      inner.appendChild(voteRow)
      inner.appendChild(votedMsg)

      const fbLabel = document.createElement('div')
      fbLabel.className = 'aperture-fb-label'
      fbLabel.textContent = 'Share what you\'d want from APERTURE'

      const fbTextarea = document.createElement('textarea')
      fbTextarea.className = 'aperture-fb-textarea'
      fbTextarea.rows = 4
      fbTextarea.placeholder = 'What signal are you watching? What would you want to find?'

      const fbBtn = document.createElement('button')
      fbBtn.className = 'aperture-fb-btn'
      fbBtn.textContent = 'Send feedback'

      const fbStatus = document.createElement('div')
      fbStatus.className = 'aperture-fb-status'

      inner.appendChild(fbLabel)
      inner.appendChild(fbTextarea)
      inner.appendChild(fbBtn)
      inner.appendChild(fbStatus)

      wrap.appendChild(inner)
      container.appendChild(wrap)

      const hasVoted = localStorage.getItem('aperture_voted')
      if (hasVoted) {
        upBtn.disabled = true
        downBtn.disabled = true
        if (hasVoted === 'up') upBtn.classList.add('voted')
        if (hasVoted === 'down') downBtn.classList.add('voted')
        votedMsg.textContent = 'Your vote is counted.'
      }

      fetch('/api/aperture-vote')
        .then(r => r.json())
        .then(data => { upCount.textContent = data.up; downCount.textContent = data.down })
        .catch(() => {})

      async function castVote(vote) {
        upBtn.disabled = true
        downBtn.disabled = true
        try {
          const r = await fetch('/api/aperture-vote', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ vote }),
          })
          const data = await r.json()
          upCount.textContent = data.up
          downCount.textContent = data.down
          localStorage.setItem('aperture_voted', vote)
          if (vote === 'up') upBtn.classList.add('voted')
          if (vote === 'down') downBtn.classList.add('voted')
          votedMsg.textContent = 'Your vote is counted.'
        } catch {
          upBtn.disabled = false
          downBtn.disabled = false
        }
      }

      if (!hasVoted) {
        upBtn.addEventListener('click', () => castVote('up'))
        downBtn.addEventListener('click', () => castVote('down'))
      }

      fbBtn.addEventListener('click', async () => {
        const feedback = fbTextarea.value.trim()
        if (!feedback) { fbTextarea.focus(); return }
        fbBtn.disabled = true
        fbTextarea.disabled = true
        fbBtn.textContent = 'Sending...'
        fbStatus.textContent = ''
        const identity = window.ORBIT_IDENTITY
          || (() => { try { return JSON.parse(localStorage.getItem('orbit_identity') || 'null') } catch { return null } })()
        try {
          await fetch('/api/aperture-feedback', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              feedback,
              name: identity?.name || '',
              email: identity?.email || '',
            }),
          })
          fbStatus.textContent = 'Feedback sent. Thank you.'
          fbBtn.textContent = 'Send feedback'
        } catch {
          fbBtn.disabled = false
          fbTextarea.disabled = false
          fbBtn.textContent = 'Send feedback'
          fbStatus.textContent = 'Something went wrong. Try again.'
        }
      })
    }
  </script>

  <script>
    ;(function() {
      // ── Build panel ──────────────────────────────────────────────────────────
      var panel = document.createElement('div')
      panel.id = 'orbit-list-panel'

      var olHeader = document.createElement('div')
      olHeader.className = 'ol-header'
      olHeader.textContent = 'IN ORBIT'

      var filterWrap = document.createElement('div')
      filterWrap.className = 'ol-filter-wrap'
      var filterInput = document.createElement('input')
      filterInput.className = 'ol-filter-input'
      filterInput.placeholder = 'Filter by name...'
      filterInput.type = 'text'
      filterWrap.appendChild(filterInput)

      var stageRow = document.createElement('div')
      stageRow.className = 'ol-stage-row'
      var STAGES = ['ALL', 'IDENTIFIED', 'REACHED_OUT', 'REPLIED', 'CONVERSATION']
      var STAGE_LABELS = { ALL: 'All', IDENTIFIED: 'Identified', REACHED_OUT: 'Reached Out', REPLIED: 'Replied', CONVERSATION: 'Conversation' }
      var activeStage = 'ALL'
      var stageBtns = {}
      STAGES.forEach(function(s) {
        var b = document.createElement('button')
        b.className = 'ol-stage-btn' + (s === 'ALL' ? ' active' : '')
        b.textContent = STAGE_LABELS[s]
        b.addEventListener('click', function() {
          activeStage = s
          STAGES.forEach(function(ss) { stageBtns[ss].classList.toggle('active', ss === s) })
          renderList()
        })
        stageBtns[s] = b
        stageRow.appendChild(b)
      })

      var contactsEl = document.createElement('div')
      contactsEl.className = 'ol-contacts'

      var olFooter = document.createElement('div')
      olFooter.className = 'ol-footer'
      olFooter.textContent = '0 / 100 conversations'

      panel.appendChild(olHeader)
      panel.appendChild(filterWrap)
      panel.appendChild(stageRow)
      panel.appendChild(contactsEl)
      panel.appendChild(olFooter)
      document.body.appendChild(panel)

      var toggle = document.createElement('button')
      toggle.id = 'orbit-list-toggle'
      toggle.textContent = '→ List'
      document.body.appendChild(toggle)

      // ── Open / close ─────────────────────────────────────────────────────────
      var isOpen = false
      function setOpen(open) {
        isOpen = open
        panel.classList.toggle('ol-open', open)
        toggle.classList.toggle('ol-shifted', open)
        toggle.textContent = open ? '← List' : '→ List'
        if (open) renderList()
      }
      toggle.addEventListener('click', function() { setOpen(!isOpen) })

      // ── Show only when orbit view is active ──────────────────────────────────
      var orbitView = document.getElementById('orbit-view')
      function syncVisibility() {
        var active = orbitView && orbitView.classList.contains('active')
        panel.classList.toggle('ol-visible', !!active)
        toggle.classList.toggle('ol-visible', !!active)
        if (!active && isOpen) setOpen(false)
      }
      if (orbitView) {
        new MutationObserver(syncVisibility).observe(orbitView, { attributes: true, attributeFilter: ['class'] })
      }
      syncVisibility()

      // ── Render ───────────────────────────────────────────────────────────────
      function renderList() {
        var contacts = window.ORBIT_CONTACTS || []
        var nameQ = filterInput.value.trim().toLowerCase()
        var filtered = contacts.filter(function(c) {
          var nameMatch = !nameQ || (c.name || '').toLowerCase().indexOf(nameQ) !== -1
          var stageMatch = activeStage === 'ALL' || c.status === activeStage
          return nameMatch && stageMatch
        })

        contactsEl.innerHTML = ''
        if (filtered.length === 0) {
          var empty = document.createElement('div')
          empty.className = 'ol-empty'
          empty.textContent = contacts.length === 0 ? 'No one in orbit yet.' : 'No matches.'
          contactsEl.appendChild(empty)
        } else {
          filtered.forEach(function(c) {
            var row = document.createElement('div')
            row.className = 'ol-contact-row'
            var nameEl = document.createElement('div')
            nameEl.className = 'ol-contact-name'
            nameEl.textContent = c.name || ''
            var stageEl = document.createElement('div')
            stageEl.className = 'ol-contact-stage'
            stageEl.textContent = (c.status || '').replace(/_/g, ' ')
            row.appendChild(nameEl)
            row.appendChild(stageEl)
            row.addEventListener('click', function() {
              document.dispatchEvent(new CustomEvent('orbit:node-selected', { detail: c }))
            })
            contactsEl.appendChild(row)
          })
        }

        var conversations = contacts.filter(function(c) { return c.status === 'CONVERSATION' }).length
        olFooter.textContent = conversations + ' / 100 conversations'
      }

      filterInput.addEventListener('input', renderList)

      document.addEventListener('orbit:contacts-updated', function(e) {
        if (e.detail && e.detail.contacts) window.ORBIT_CONTACTS = e.detail.contacts
        renderList()
      })
    })()
  </script>
