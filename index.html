<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ORBIT</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:     #0a0a0a;
      --text:   #f0ece4;
      --accent: #b87333;

      --bg-10:     rgba(10, 10, 10, 0.10);
      --bg-80:     rgba(10, 10, 10, 0.80);
      --text-40:   rgba(240, 236, 228, 0.40);
      --text-70:   rgba(240, 236, 228, 0.70);
      --accent-20: rgba(184, 115, 51, 0.20);
      --accent-60: rgba(184, 115, 51, 0.60);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 56px;
      border-bottom: 1px solid var(--accent-20);
      background: var(--bg-80);
      backdrop-filter: blur(8px);
    }

    .nav-wordmark {
      font-family: 'Courier Prime', monospace;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: var(--accent);
      text-transform: uppercase;
      text-decoration: none;
      user-select: none;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      font-family: 'Courier Prime', monospace;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.14em;
      color: var(--text-70);
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.15s ease;
      cursor: pointer;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--text);
    }

    .nav-links a.active {
      color: var(--accent);
    }

    /* ── VIEWS ── */
    main {
      padding-top: 56px;
      width: 100%;
      height: 100%;
    }

    .view {
      display: none;
      width: 100%;
      height: calc(100vh - 56px);
    }

    .view.active {
      display: block;
    }

    #orbit-view  { /* canvas fills this */ }
    #search-view { padding: 40px 32px; }
    #suggest-view { padding: 40px 32px; }

    /* ── ADMIN BADGE ── */
    #admin-badge {
      font-family: 'Courier Prime', monospace;
      font-size: 10px; letter-spacing: 0.18em;
      color: #b87333;
      background: rgba(184,115,51,0.12);
      border: 1px solid rgba(184,115,51,0.35);
      border-radius: 2px;
      padding: 3px 10px;
      text-transform: uppercase;
      user-select: none;
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-wordmark" data-view="orbit">ORBIT</a>
    <ul class="nav-links">
      <li><a data-view="orbit"  class="active">ORBIT</a></li>
      <li><a data-view="search">SEARCH</a></li>
      <li><a data-view="suggest">SUGGEST</a></li>
    </ul>
    <span id="admin-badge" hidden>ADMIN</span>
  </nav>

  <main>
    <div id="orbit-view"  class="view active"></div>
    <div id="search-view"  class="view"></div>
    <div id="suggest-view" class="view"></div>
  </main>

  <script>
    // Admin mode: ?admin=true activates logging + raw response panel
    window.ORBIT_ADMIN = new URLSearchParams(location.search).get('admin') === 'true'
    if (window.ORBIT_ADMIN) {
      document.getElementById('admin-badge').hidden = false
      console.log('[ORBIT ADMIN] Admin mode active — logging all API calls and events')
    }
  </script>

  <script type="module">
    const links = document.querySelectorAll('[data-view]')
    const views = document.querySelectorAll('.view')

    function activate(viewId) {
      links.forEach(l => l.classList.toggle('active', l.dataset.view === viewId))
      views.forEach(v => v.classList.toggle('active', v.id === `${viewId}-view`))
    }

    links.forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault()
        activate(link.dataset.view)
      })
    })
  </script>

  <script type="module" src="/frontend/orbit-view.js"></script>
  <script type="module" src="/frontend/search-view.js"></script>
  <script type="module" src="/frontend/suggest-view.js"></script>

</body>
</html>
